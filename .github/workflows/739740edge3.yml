name: "Test: Prerelease Edge Cases"

on:
  workflow_dispatch:
  push:

jobs:
  validate-11-preview-4:
    name: "Validate 11.0.0-preview.4.26230.115"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: echo '{"sdk":{"version":"11.0.0-preview.4.26230.115","rollForward":"latestFeature"}}' > global.json
      - uses: priyagupta108/setup-dotnet@validate-global-json-sdk-version
        with:
          global-json-file: global.json
      - run: dotnet --list-sdks

  validate-11-preview-5:
    name: "Validate 11.0.0-preview.5.26302.115"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: echo '{"sdk":{"version":"11.0.0-preview.5.26302.115","rollForward":"latestFeature"}}' > global.json
      - uses: priyagupta108/setup-dotnet@validate-global-json-sdk-version
        with:
          global-json-file: global.json
      - run: dotnet --list-sdks

  validate-11-preview-3:  
    name: "Validate 11.0.0-preview.3.26207.106"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: echo '{"sdk":{"version":"11.0.0-preview.3.26207.106","rollForward":"latestFeature"}}' > global.json
      - uses: priyagupta108/setup-dotnet@validate-global-json-sdk-version
        with:
          global-json-file: global.json
      - run: dotnet --list-sdks

  validate-11-preview-4:
    name: "Validate 11.0.0-preview.4.26230.115"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: echo '{"sdk":{"version":"11.0.0-preview.4.26230.115","rollForward":"latestFeature"}}' > global.json
      - uses: priyagupta108/setup-dotnet@validate-global-json-sdk-version
        with:
          global-json-file: global.json
      - run: dotnet --list-sdks

  invalid-two-part-prerelease:
    name: "Invalid: 8.0-preview.1 (not valid semver)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: echo '{"sdk":{"version":"8.0-preview.1","rollForward":"latestFeature"}}' > global.json
      - uses: priyagupta108/setup-dotnet@validate-global-json-sdk-version
        id: setup
        continue-on-error: true
        with:
          global-json-file: global.json
      - name: Verify failure
        if: always()
        run: |
          if [ "${{ steps.setup.outcome }}" = "failure" ]; then
            echo " Correctly rejected '8.0-preview.1'"
          else
            echo " Should have failed for '8.0-preview.1'"
            exit 1
          fi