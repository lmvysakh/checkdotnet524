name: "Test: Version Format Validation"

on:
  push:
   
  workflow_dispatch:

jobs:
  # =============================================================
  # VALID STABLE VERSIONS
  # =============================================================
  valid-9-0-100:
    name: "Valid: 9.0.100 (GA, band 1, patch 00)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Write global.json
        shell: bash
        run: |
          echo '{"sdk":{"version":"9.0.100","rollForward":"latestPatch"}}' > global.json
      - uses: priyagupta108/setup-dotnet@validate-global-json-sdk-version
        with:
          global-json-file: global.json
      - run: dotnet --list-sdks

  valid-8-0-101:
    name: "Valid: 8.0.101 (GA, band 1, patch 01)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Write global.json
        shell: bash
        run: |
          echo '{"sdk":{"version":"8.0.101","rollForward":"latestPatch"}}' > global.json
      - uses: priyagupta108/setup-dotnet@validate-global-json-sdk-version
        with:
          global-json-file: global.json
      - run: dotnet --list-sdks

  valid-8-0-200:
    name: "Valid: 8.0.200 (GA, band 2)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Write global.json
        shell: bash
        run: |
          echo '{"sdk":{"version":"8.0.200","rollForward":"latestPatch"}}' > global.json
      - uses: priyagupta108/setup-dotnet@validate-global-json-sdk-version
        with:
          global-json-file: global.json
      - run: dotnet --list-sdks



 
  # =============================================================
  # INVALID VERSIONS (should fail with clear error)
  # =============================================================
  invalid-major-only:
    name: "Invalid: 10 (major only)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Write global.json
        shell: bash
        run: |
          echo '{"sdk":{"version":"10","rollForward":"latestPatch"}}' > global.json
      - uses: priyagupta108/setup-dotnet@validate-global-json-sdk-version
        id: setup
        with:
          global-json-file: global.json
        
      - name: Verify failure
        shell: bash
        run: |
          if [ "${{ steps.setup.outcome }}" = "failure" ]; then
            echo "Correctly rejected '10'"
          else
            echo "Should have failed for '10'"
            exit 1
          fi
  invalid-major-minor-10-0:
    name: "Invalid: 10.0 (missing patch)"
    runs-on: ubuntu-latest
