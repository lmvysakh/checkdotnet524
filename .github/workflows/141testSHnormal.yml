name: Self-Hosted Test with pre installed and non pre installed .NET SDKs

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  install-dotnet:
    name: Install .NET 
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 8.0 
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '8.0'
    
      - name: Setup .NET 9.0 
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '9.0'

      - name: Setup .NET 11 Preview
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '11.0.100-preview.5.26302.115'


      # - name: Record post-install state
      #   run: |
      #     Write-Host " Installed .NET SDKs "
      #     dotnet --list-sdks
      #     Write-Host ""
      #     Write-Host " dotnet version "
      #     dotnet --version
      #   shell: powershell

      - name: Remove all .NET SDK caches
        run: |
          Write-Host "=== Listing and deleting all dotnet SDK caches ==="
          $caches = gh cache list --repo ${{ github.repository }} --json key --jq '.[].key' | Where-Object { $_ -match "dotnet-sdk" }
          foreach ($cache in $caches) {
            Write-Host "Deleting: $cache"
            gh cache delete "$cache" --repo ${{ github.repository }}
          }
          if (-not $caches) { Write-Host "No dotnet SDK caches found" }
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}