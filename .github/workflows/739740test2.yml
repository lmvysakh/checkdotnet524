name: Test Invalid SDK Format

on:
  push:
  workflow_dispatch:

jobs:
  test-preview-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Write global.json(10.0.100-dev)
        shell: bash
        run: |
          echo '{"sdk":{"version":"10.0.100-dev","rollForward":"latestFeature"}}' > global.json
      - name: Check version
        run: dotnet --info

  test-preview-format-invalid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Write global.json(8.0.000-preview.1)
        shell: bash
        run: |
          echo '{"sdk":{"version":"8.0.000-preview.1","rollForward":"latestFeature"}}' > global.json
      - name: Check version
        run: dotnet --info

  test-alpha-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Write global.json(10.0.100-alpha.1.25001.1)
        shell: bash
        run: |
          echo '{"sdk":{"version":"10.0.100-alpha.1.25001.1","rollForward":"latestFeature"}}' > global.json
      - name: Check version
        run: dotnet --info

  test-two-part:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Write global.json(10.0)
        shell: bash
        run: |
