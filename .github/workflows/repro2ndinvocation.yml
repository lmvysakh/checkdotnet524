name: "Reproduce File Exists – setup-dotnet"

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1st setup-dotnet call: restores NuGet cache (miss on 1st run, hit on 2nd run)
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
          cache: true

      # Populate the NuGet cache so there's something to restore next time
      - name: Restore dependencies
        run: dotnet restore

      # 2nd setup-dotnet call: triggers the issue
      # - 1st workflow run: cache miss → seeds the cache
      # - 2nd workflow run: cache HIT → potential tar "Cannot open: File exists"
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
          cache: true